# Remove test topics and databases

---

- name: Clean
  import_playbook: clean.yaml

- hosts: localhost
  gather_facts: false
  tasks:
    - name: Pause for 10 seconds
      ansible.builtin.pause:
        seconds: 10

- name: Ingest
  import_playbook: ingest.yaml

- name: Sherlock
  import_playbook: sherlock.yaml

- name: Filter
  import_playbook: filter.yaml

- name: Annotations
  import_playbook: annotations.yaml

- name: Clean
  import_playbook: clean.yaml

